# H2 in-memory database (thay thế PostgreSQL khi test)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA - H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# JWT (dummy values - chỉ dùng khi test)
jwt.secret=testsecretkey1234567890abcdef1234567890abcdef
jwt.expiration=86400000
jwt.refresh-expiration-days=7
